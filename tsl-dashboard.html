<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSL Dashboard — The Stock Logic</title>
<style>
  :root{--bg:#0a0e14;--s1:#0f141c;--s2:#161d28;--line:#27313f;--line2:#1a222e;--white:#e6edf3;--muted:#9aa7b6;--muted2:#6b7888;--green:#00d68f;--red:#ff4d6d;--sky:#4db8ff;--amber:#ffb454;--mono:'SF Mono',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--white);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased;padding:0 0 60px}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}
  nav{position:sticky;top:0;z-index:100;background:rgba(6,8,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px}
  nav .logo{font-family:var(--mono);font-size:12px;letter-spacing:2px;color:var(--white);text-decoration:none;font-weight:700}
  .nav-tabs{display:flex;align-items:center;gap:4px;margin-left:20px}
  .nav-tabs a,.nav-tabs span{font-size:10px;letter-spacing:1px;text-decoration:none;padding:4px 8px;border:1px solid var(--line)}
  .nav-tabs a{color:var(--white);background:var(--s2)}
  .nav-tabs a.active{color:var(--sky);border-color:rgba(77,184,255,0.4);background:rgba(77,184,255,0.06)}
  .nav-tabs .lk{color:var(--muted2);border-color:rgba(255,255,255,0.04);cursor:not-allowed}
  header.hd{border-bottom:1px solid var(--line);padding:26px 0 20px;background:radial-gradient(700px 240px at 8% -20%,rgba(77,184,255,.06),transparent 60%)}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--sky);margin-bottom:8px}
  h1{font-size:24px;letter-spacing:.5px;font-weight:800}
  .sub{margin-top:7px;color:var(--muted2);font-family:var(--mono);font-size:11px}
  .summary{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-top:20px}
  @media(max-width:820px){.summary{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:480px){.summary{grid-template-columns:repeat(2,1fr)}}
  .scard{border:1px solid var(--line);border-radius:9px;background:var(--s1);padding:13px 14px}
  .scard .k{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;min-height:22px}
  .scard .v{font-size:24px;font-weight:800;line-height:1}
  .scard .pct{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-top:5px}
  .v.green{color:var(--green)}.v.red{color:var(--red)}.v.sky{color:var(--sky)}.v.amber{color:var(--amber)}
  .pct.green{color:var(--green)}.pct.red{color:var(--red)}
  .controls{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;align-items:center}
  .fbtn{font-family:var(--mono);font-size:11px;padding:6px 12px;border:1px solid var(--line);background:var(--s1);color:var(--muted);border-radius:6px;cursor:pointer;transition:.15s}
  .fbtn:hover{border-color:var(--muted2);color:var(--white)}
  .fbtn.active{border-color:rgba(77,184,255,.5);color:var(--sky);background:rgba(77,184,255,.06)}
  .vtoggle{margin-left:auto;display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .vtoggle button{font-family:var(--mono);font-size:10px;padding:6px 14px;background:var(--s1);color:var(--muted2);border:none;cursor:pointer;letter-spacing:.05em}
  .vtoggle button.active{background:var(--s2);color:var(--sky)}
  .tbl-wrap{margin-top:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:920px}
  thead th{background:var(--s2);font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted2);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
  thead th:hover{color:var(--muted)}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line2);white-space:nowrap}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .sym{font-weight:700}
  .num{font-family:var(--mono);font-size:11px;text-align:right}
  .pill{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block}
  .dir-long{color:var(--green);border:1px solid rgba(0,214,143,.35);background:rgba(0,214,143,.07)}
  .dir-short{color:var(--red);border:1px solid rgba(255,77,109,.35);background:rgba(255,77,109,.07)}
  .g-aplus{color:var(--sky);font-weight:700}.g-a{color:var(--green);font-weight:700}.g-b{color:var(--muted);font-weight:700}
  .o-win{color:var(--green);border:1px solid rgba(0,214,143,.35);background:rgba(0,214,143,.07)}
  .o-loss{color:var(--red);border:1px solid rgba(255,77,109,.35);background:rgba(255,77,109,.07)}
  .o-open{color:var(--sky);border:1px solid rgba(77,184,255,.3);background:rgba(77,184,255,.06)}
  .o-missed{color:var(--amber);border:1px solid rgba(255,180,84,.3);background:rgba(255,180,84,.06)}
  .o-inval{color:var(--muted2);border:1px solid var(--line)}
  .o-ns{color:var(--muted2);border:1px dashed var(--line)}
  .pnl-pos{color:var(--green);font-weight:700}.pnl-neg{color:var(--red);font-weight:700}.pnl-zero{color:var(--muted2)}
  #chipView{margin-top:14px;display:none}
  .chip-day{display:grid;grid-template-columns:110px 1fr 40px;gap:14px;align-items:center;padding:13px 16px;border:1px solid var(--line);border-radius:9px;background:var(--s1);margin-bottom:8px}
  .chip-date{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .chip-row{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid;font-weight:600}
  .chip.win{color:var(--green);border-color:rgba(0,214,143,.4);background:rgba(0,214,143,.07)}
  .chip.loss{color:var(--red);border-color:rgba(255,77,109,.4);background:rgba(255,77,109,.07)}
  .chip.open{color:var(--sky);border-color:rgba(77,184,255,.35);background:rgba(77,184,255,.06)}
  .chip.other{color:var(--amber);border-color:rgba(255,180,84,.35);background:rgba(255,180,84,.06)}
  .chip-count{font-family:var(--mono);font-size:11px;color:var(--muted2);text-align:right}
  .chip-legend{display:flex;gap:16px;margin-top:12px;font-family:var(--mono);font-size:10px;color:var(--muted2)}
  .chip-legend span{display:flex;align-items:center;gap:5px}
  .dot2{width:9px;height:9px;border-radius:3px;display:inline-block}
  .foot{margin-top:18px;font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.7}
  .loading{padding:60px 0;text-align:center;color:var(--muted2);font-family:var(--mono);font-size:12px}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">THE STOCK LOGIC</a>
  <div class="nav-tabs">
    <a href="/dashboard">EQUITY</a>
    <a href="/tsl-dashboard" class="active">TSL DASHBOARD</a>
    <span class="lk">ATLAS &#128274;</span>
    <span class="lk">F&amp;O &#128274;</span>
    <span class="lk">MCX &#128274;</span>
  </div>
  <div style="font-family:var(--mono);font-size:10px;color:var(--muted2)" id="liveLabel">LIVE</div>
</nav>
<header class="hd"><div class="wrap">
  <div class="eyebrow">The Stock Logic &middot; Historical Record</div>
  <h1>TSL Trades Performance Dashboard</h1>
  <div class="sub" id="sub">Fetching live data&hellip;</div>
</div></header>
<div class="wrap">
  <div class="summary" id="summary"></div>
  <div class="controls">
    <button class="fbtn active" data-f="all">ALL</button>
    <button class="fbtn" data-f="LONG">LONG</button>
    <button class="fbtn" data-f="SHORT">SHORT</button>
    <button class="fbtn" data-f="WIN">WINS</button>
    <button class="fbtn" data-f="LOSS">LOSSES</button>
    <button class="fbtn" data-f="OPEN">OPEN</button>
    <button class="fbtn" data-f="OTHERS">OTHERS</button>
    <div class="vtoggle"><button id="vTable" class="active">TABLE</button><button id="vChips">CHIPS</button></div>
  </div>
  <div class="tbl-wrap" id="tableView"><table id="tbl">
    <thead><tr>
      <th data-s="signal_date">Date</th><th data-s="symbol">Symbol</th><th data-s="direction">Dir</th>
      <th data-s="grade">Grade</th><th data-s="score">Score</th><th data-s="entry_ref">Entry</th>
      <th data-s="sl">SL</th><th data-s="target_1">T1</th><th data-s="target_2">T2</th>
      <th data-s="outcome">Outcome</th><th data-s="pnl">P&amp;L &#8377;</th>
    </tr></thead>
    <tbody id="tbody"><tr><td colspan="11" class="loading">Loading signals&hellip;</td></tr></tbody>
  </table></div>
  <div id="chipView"></div>
  <div class="chip-legend" id="legend" style="display:none">
    <span><i class="dot2" style="background:var(--green)"></i>Win</span>
    <span><i class="dot2" style="background:var(--red)"></i>Loss</span>
    <span><i class="dot2" style="background:var(--sky)"></i>Open</span>
    <span><i class="dot2" style="background:var(--amber)"></i>Missed / Other</span>
  </div>
  <div class="foot" id="foot"></div>
</div>
<script>
var SB='https://eibdlcanpudjgmkjxrga.supabase.co';
var AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpYmRsY2FucHVkamdta2p4cmdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MzUxODMsImV4cCI6MjA5NDExMTE4M30.KmdMatjh1l8I-c80h71W7g0elATIBCwefa5gFU7t29A';
var HDR={apikey:AK,Authorization:'Bearer '+AK};
const RANK={WIN_T1:5,WIN_T2:5,LOSS:4,MISSED:3,INVALIDATED:3,OPEN:1,NOT_SCORED:0};
let ALL=[], DATA=[], curFilter='all', view='table', sortKey='signal_date', sortDir=-1;

async function loadData(){
  try{
    // Fetch signals (levels) + outcomes (results) in parallel
    const [sigR, outR] = await Promise.all([
      fetch(SB+'/rest/v1/signals?select=id,symbol,signal_date,direction,grade,score,entry_ref,sl,target_1,target_2&order=signal_date.desc&limit=300',{headers:HDR}),
      fetch(SB+'/rest/v1/signal_outcomes?select=signal_id,outcome,entry_status,actual_entry,exit_price,days_held,pnl&limit=2000',{headers:HDR})
    ]);
    const sigs=await sigR.json();
    const outs=await outR.json();
    // dedup outcomes on signal_id, keep most-resolved
    const omap={};
    for(const o of outs){const i=o.signal_id; if(!(i in omap)||(RANK[o.outcome]||0)>(RANK[omap[i].outcome]||0))omap[i]=o;}
    // join
    const merged=sigs.map(s=>{const o=omap[s.id]||{}; return {...s,outcome:o.outcome||'NOT_SCORED',entry_status:o.entry_status,actual_entry:o.actual_entry,exit_price:o.exit_price,days_held:o.days_held,pnl:o.pnl};});
    // dedup signals on id (guard)
    const byId={};
    for(const r of merged){const i=r.id; if(!(i in byId)||(RANK[r.outcome]||0)>(RANK[byId[i].outcome]||0))byId[i]=r;}
    ALL=Object.values(byId).sort((a,b)=>a.signal_date<b.signal_date?1:-1);
    DATA=ALL.slice(0,100);
    renderSummary(); render();
  }catch(e){
    document.getElementById('sub').textContent='Failed to load data: '+e.message;
    document.getElementById('tbody').innerHTML='<tr><td colspan="11" class="loading">Could not fetch signals. '+e.message+'</td></tr>';
  }
}
function isWin(r){return r.outcome==='WIN_T1'||r.outcome==='WIN_T2';}
function isLoss(r){return r.outcome==='LOSS';}
function isOpen(r){return r.outcome==='OPEN';}
function isOther(r){return r.outcome==='MISSED'||r.outcome==='INVALIDATED'||r.outcome==='NOT_SCORED';}
function renderSummary(){
  const T=DATA.length;
  const win=DATA.filter(isWin),loss=DATA.filter(isLoss),open=DATA.filter(isOpen),other=DATA.filter(isOther);
  const exec=win.length+loss.length;
  const pnl=[...win,...loss].reduce((s,r)=>s+(parseFloat(r.pnl)||0),0);
  const pctT=n=>T?Math.round(n/T*100)+'%':'0%';
  const pctE=n=>exec?Math.round(n/exec*100)+'%':'\u2014';
  const cards=[
    {k:'Open',v:open.length,pct:pctT(open.length),cls:'sky'},
    {k:'Others',v:other.length,pct:pctT(other.length),cls:'amber'},
    {k:'Executed',v:exec,pct:pctT(exec),cls:''},
    {k:'Win',v:win.length,pct:pctE(win.length)+' of exec',cls:'green',pcls:'green'},
    {k:'Loss',v:loss.length,pct:pctE(loss.length)+' of exec',cls:'red',pcls:'red'},
    {k:'Net P&L \u20b9',v:(pnl>=0?'+':'')+Math.round(pnl).toLocaleString('en-IN'),pct:'executed only',cls:pnl>=0?'green':'red'},
  ];
  document.getElementById('summary').innerHTML=cards.map(c=>`<div class="scard"><div class="k">${c.k}</div><div class="v ${c.cls}">${c.v}</div><div class="pct ${c.pcls||''}">${c.pct}</div></div>`).join('');
  document.getElementById('sub').textContent=ALL.length+' total signals \u00b7 showing latest '+DATA.length+(DATA.length?(' \u00b7 '+DATA[DATA.length-1].signal_date+' \u2192 '+DATA[0].signal_date):'');
}
function dirPill(d){return '<span class="pill '+(d==='LONG'?'dir-long':'dir-short')+'">'+(d==='LONG'?'\u2191':'\u2193')+' '+d+'</span>';}
function grade(g){const c=g==='A+'?'g-aplus':g==='A'?'g-a':'g-b';return '<span class="'+c+'">'+(g||'-')+'</span>';}
function outPill(o){const m={WIN_T1:['o-win','WIN'],WIN_T2:['o-win','WIN T2'],LOSS:['o-loss','LOSS'],OPEN:['o-open','OPEN'],MISSED:['o-missed','MISSED'],INVALIDATED:['o-inval','INVALID'],NOT_SCORED:['o-ns','UNSCORED']};const a=m[o]||['o-ns',o];return '<span class="pill '+a[0]+'">'+a[1]+'</span>';}
function pnl(p){const v=parseFloat(p)||0;if(!v)return '<span class="num pnl-zero">\u2014</span>';return '<span class="num '+(v>0?'pnl-pos':'pnl-neg')+'">'+(v>0?'+':'')+Math.round(v).toLocaleString('en-IN')+'</span>';}
function nm(x){const v=parseFloat(x);return isNaN(v)?'\u2014':v.toLocaleString('en-IN',{maximumFractionDigits:2});}
function chipClass(r){if(isWin(r))return 'win';if(isLoss(r))return 'loss';if(isOpen(r))return 'open';return 'other';}
function filt(rows){
  if(curFilter==='all')return rows;
  if(curFilter==='LONG'||curFilter==='SHORT')return rows.filter(r=>r.direction===curFilter);
  if(curFilter==='WIN')return rows.filter(isWin);
  if(curFilter==='LOSS')return rows.filter(isLoss);
  if(curFilter==='OPEN')return rows.filter(isOpen);
  if(curFilter==='OTHERS')return rows.filter(isOther);
  return rows;
}
function rowHtml(r){return '<tr><td class="num">'+r.signal_date+'</td><td class="sym">'+r.symbol+'</td><td>'+dirPill(r.direction)+'</td><td>'+grade(r.grade)+'</td><td class="num">'+(r.score==null?'-':r.score)+'</td><td class="num">'+nm(r.entry_ref)+'</td><td class="num">'+nm(r.sl)+'</td><td class="num">'+nm(r.target_1)+'</td><td class="num">'+nm(r.target_2)+'</td><td>'+outPill(r.outcome)+'</td><td>'+pnl(r.pnl)+'</td></tr>';}
function renderTable(){
  let rows=filt(DATA).slice();
  rows.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];if(['score','pnl','entry_ref','sl','target_1','target_2'].includes(sortKey)){x=parseFloat(x)||0;y=parseFloat(y)||0;}else{x=String(x||'');y=String(y||'');}return x<y?-sortDir:x>y?sortDir:0;});
  document.getElementById('tbody').innerHTML=rows.length?rows.map(rowHtml).join(''):'<tr><td colspan="11" class="loading">No signals for this filter.</td></tr>';
  return rows.length;
}
function renderChips(){
  let rows=filt(DATA).slice();
  const g={};rows.forEach(r=>{(g[r.signal_date]=g[r.signal_date]||[]).push(r);});
  let h='';
  Object.keys(g).sort().reverse().forEach(d=>{
    const chips=g[d].map(r=>'<span class="chip '+chipClass(r)+'" title="'+r.outcome+'">'+r.symbol+'</span>').join('');
    h+='<div class="chip-day"><div class="chip-date">'+d+'</div><div class="chip-row">'+chips+'</div><div class="chip-count">'+g[d].length+'</div></div>';
  });
  document.getElementById('chipView').innerHTML=h||'<div class="foot">No signals for this filter.</div>';
  return rows.length;
}
function render(){
  let n;
  if(view==='table'){
    document.getElementById('tableView').style.display='block';
    document.getElementById('chipView').style.display='none';
    document.getElementById('legend').style.display='none';
    n=renderTable();
  }else{
    document.getElementById('tableView').style.display='none';
    document.getElementById('chipView').style.display='block';
    document.getElementById('legend').style.display='flex';
    n=renderChips();
  }
  document.getElementById('foot').textContent=n+' signals shown \u00b7 EOD signals only, live breakouts (ORB/RBE) not yet scored \u00b7 win rate uses T1-only + SL-first rule (understated) \u00b7 PnL at historical \u20b95k sizing.';
}
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=b.dataset.f;render();}));
document.getElementById('vTable').addEventListener('click',()=>{view='table';document.getElementById('vTable').classList.add('active');document.getElementById('vChips').classList.remove('active');render();});
document.getElementById('vChips').addEventListener('click',()=>{view='chips';document.getElementById('vChips').classList.add('active');document.getElementById('vTable').classList.remove('active');render();});
document.querySelectorAll('thead th').forEach(th=>th.addEventListener('click',()=>{if(view!=='table')return;const k=th.dataset.s;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=k==='signal_date'?-1:1;}render();}));
loadData();
</script>
</body>
</html>
