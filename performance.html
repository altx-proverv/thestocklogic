<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSL Trades Performance Dashboard</title>
<style>
  :root{--bg:#0a0e14;--s1:#0f141c;--s2:#161d28;--line:#27313f;--line2:#1a222e;--white:#e6edf3;--muted:#9aa7b6;--muted2:#6b7888;--green:#00d68f;--red:#ff4d6d;--sky:#4db8ff;--amber:#ffb454;--mono:'SF Mono',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--white);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased;padding:0 0 60px}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}
  header{border-bottom:1px solid var(--line);padding:26px 0 20px;background:radial-gradient(700px 240px at 8% -20%,rgba(77,184,255,.06),transparent 60%)}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--sky);margin-bottom:8px}
  h1{font-size:24px;letter-spacing:.5px;font-weight:800}
  .sub{margin-top:7px;color:var(--muted2);font-family:var(--mono);font-size:11px}
  .summary{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-top:20px}
  @media(max-width:820px){.summary{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:480px){.summary{grid-template-columns:repeat(2,1fr)}}
  .scard{border:1px solid var(--line);border-radius:9px;background:var(--s1);padding:13px 14px}
  .scard .k{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;min-height:22px}
  .scard .v{font-size:24px;font-weight:800;line-height:1}
  .scard .pct{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-top:5px}
  .v.green{color:var(--green)}.v.red{color:var(--red)}.v.sky{color:var(--sky)}.v.amber{color:var(--amber)}
  .pct.green{color:var(--green)}.pct.red{color:var(--red)}
  .controls{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;align-items:center}
  .fbtn{font-family:var(--mono);font-size:11px;padding:6px 12px;border:1px solid var(--line);background:var(--s1);color:var(--muted);border-radius:6px;cursor:pointer;transition:.15s}
  .fbtn:hover{border-color:var(--muted2);color:var(--white)}
  .fbtn.active{border-color:rgba(77,184,255,.5);color:var(--sky);background:rgba(77,184,255,.06)}
  .vtoggle{margin-left:auto;display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .vtoggle button{font-family:var(--mono);font-size:10px;padding:6px 12px;background:var(--s1);color:var(--muted2);border:none;cursor:pointer}
  .vtoggle button.active{background:var(--s2);color:var(--sky)}
  .tbl-wrap{margin-top:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:920px}
  thead th{background:var(--s2);font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted2);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0}
  thead th:hover{color:var(--muted)}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line2);white-space:nowrap}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .daygrp td{background:var(--s2);font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);padding:7px 12px;text-transform:uppercase}
  .sym{font-weight:700}
  .num{font-family:var(--mono);font-size:11px;text-align:right}
  .pill{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block}
  .dir-long{color:var(--green);border:1px solid rgba(0,214,143,.35);background:rgba(0,214,143,.07)}
  .dir-short{color:var(--red);border:1px solid rgba(255,77,109,.35);background:rgba(255,77,109,.07)}
  .g-aplus{color:var(--sky);font-weight:700}.g-a{color:var(--green);font-weight:700}.g-b{color:var(--muted);font-weight:700}
  .o-win{color:var(--green);border:1px solid rgba(0,214,143,.35);background:rgba(0,214,143,.07)}
  .o-loss{color:var(--red);border:1px solid rgba(255,77,109,.35);background:rgba(255,77,109,.07)}
  .o-open{color:var(--sky);border:1px solid rgba(77,184,255,.3);background:rgba(77,184,255,.06)}
  .o-missed{color:var(--amber);border:1px solid rgba(255,180,84,.3);background:rgba(255,180,84,.06)}
  .o-inval{color:var(--muted2);border:1px solid var(--line)}
  .o-ns{color:var(--muted2);border:1px dashed var(--line)}
  .pnl-pos{color:var(--green);font-weight:700}.pnl-neg{color:var(--red);font-weight:700}.pnl-zero{color:var(--muted2)}
  .foot{margin-top:18px;font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.7}
</style>
</head>

const RANK={WIN_T1:5,WIN_T2:5,LOSS:4,MISSED:3,INVALIDATED:3,OPEN:1,NOT_SCORED:0};
const byId={};
for(const r of RAW){const i=r.id; if(!(i in byId)||(RANK[r.outcome]||0)>(RANK[byId[i].outcome]||0))byId[i]=r;}
let ALL=Object.values(byId).sort((a,b)=>a.signal_date<b.signal_date?1:-1);
let DATA=ALL.slice(0,100);
let curFilter='all', view='flat', sortKey='signal_date', sortDir=-1;
function isWin(r){return r.outcome==='WIN_T1'||r.outcome==='WIN_T2';}
function isLoss(r){return r.outcome==='LOSS';}
function isOpen(r){return r.outcome==='OPEN';}
function isOther(r){return r.outcome==='MISSED'||r.outcome==='INVALIDATED'||r.outcome==='NOT_SCORED';}
function renderSummary(){
  const T=DATA.length;
  const win=DATA.filter(isWin),loss=DATA.filter(isLoss),open=DATA.filter(isOpen),other=DATA.filter(isOther);
  const exec=win.length+loss.length;
  const pnl=[...win,...loss].reduce((s,r)=>s+(parseFloat(r.pnl)||0),0);
  const pctT=n=>Math.round(n/T*100)+'%';
  const pctE=n=>exec?Math.round(n/exec*100)+'%':'\u2014';
  const cards=[
    {k:'Open',v:open.length,pct:pctT(open.length),cls:'sky'},
    {k:'Others',v:other.length,pct:pctT(other.length),cls:'amber'},
    {k:'Executed',v:exec,pct:pctT(exec),cls:''},
    {k:'Win',v:win.length,pct:pctE(win.length)+' of exec',cls:'green',pcls:'green'},
    {k:'Loss',v:loss.length,pct:pctE(loss.length)+' of exec',cls:'red',pcls:'red'},
    {k:'Net P&L \u20b9',v:(pnl>=0?'+':'')+Math.round(pnl).toLocaleString('en-IN'),pct:'executed only',cls:pnl>=0?'green':'red'},
  ];
  document.getElementById('summary').innerHTML=cards.map(c=>`<div class="scard"><div class="k">${c.k}</div><div class="v ${c.cls}">${c.v}</div><div class="pct ${c.pcls||''}">${c.pct}</div></div>`).join('');
  document.getElementById('sub').textContent=`${ALL.length} total signals \u00b7 showing latest 100 \u00b7 ${DATA[DATA.length-1].signal_date} \u2192 ${DATA[0].signal_date} \u00b7 Open ${open.length} + Others ${other.length} + Executed ${exec} = ${open.length+other.length+exec}`;
}
function dirPill(d){return `<span class="pill ${d==='LONG'?'dir-long':'dir-short'}">${d==='LONG'?'\u2191':'\u2193'} ${d}</span>`;}
function grade(g){const c=g==='A+'?'g-aplus':g==='A'?'g-a':'g-b';return `<span class="${c}">${g||'-'}</span>`;}
function outPill(o){const m={WIN_T1:['o-win','WIN'],WIN_T2:['o-win','WIN T2'],LOSS:['o-loss','LOSS'],OPEN:['o-open','OPEN'],MISSED:['o-missed','MISSED'],INVALIDATED:['o-inval','INVALID'],NOT_SCORED:['o-ns','UNSCORED']};const a=m[o]||['o-ns',o];return `<span class="pill ${a[0]}">${a[1]}</span>`;}
function pnl(p){const v=parseFloat(p)||0;if(!v)return '<span class="num pnl-zero">\u2014</span>';return `<span class="num ${v>0?'pnl-pos':'pnl-neg'}">${v>0?'+':''}${Math.round(v).toLocaleString('en-IN')}</span>`;}
function nm(x){const v=parseFloat(x);return isNaN(v)?'\u2014':v.toLocaleString('en-IN',{maximumFractionDigits:2});}
function filt(rows){
  if(curFilter==='all')return rows;
  if(curFilter==='LONG'||curFilter==='SHORT')return rows.filter(r=>r.direction===curFilter);
  if(curFilter==='WIN')return rows.filter(isWin);
  if(curFilter==='LOSS')return rows.filter(isLoss);
  if(curFilter==='OPEN')return rows.filter(isOpen);
  if(curFilter==='OTHERS')return rows.filter(isOther);
  return rows;
}
function rowHtml(r){return `<tr><td class="num">${r.signal_date}</td><td class="sym">${r.symbol}</td><td>${dirPill(r.direction)}</td><td>${grade(r.grade)}</td><td class="num">${r.score==null?'-':r.score}</td><td class="num">${nm(r.entry_ref)}</td><td class="num">${nm(r.sl)}</td><td class="num">${nm(r.target_1)}</td><td class="num">${nm(r.target_2)}</td><td>${outPill(r.outcome)}</td><td>${pnl(r.pnl)}</td></tr>`;}
function render(){
  let rows=filt(DATA).slice();
  if(view==='flat'){
    rows.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];if(['score','pnl','entry_ref','sl','target_1','target_2'].includes(sortKey)){x=parseFloat(x)||0;y=parseFloat(y)||0;}else{x=String(x||'');y=String(y||'');}return x<y?-sortDir:x>y?sortDir:0;});
    document.getElementById('tbody').innerHTML=rows.map(rowHtml).join('');
  }else{
    const g={};rows.forEach(r=>{(g[r.signal_date]=g[r.signal_date]||[]).push(r);});
    let h='';Object.keys(g).sort().reverse().forEach(d=>{h+=`<tr class="daygrp"><td colspan="11">${d} \u00b7 ${g[d].length} signal${g[d].length>1?'s':''}</td></tr>`;h+=g[d].map(rowHtml).join('');});
    document.getElementById('tbody').innerHTML=h;
  }
  document.getElementById('foot').textContent=`${rows.length} rows shown \u00b7 EOD signals only, live breakouts (ORB/RBE) not yet scored \u00b7 win rate uses T1-only + SL-first rule (understated) \u00b7 PnL at historical \u20b95k sizing \u00b7 Phase 2 adds executed/open/closed/expired tracking.`;
}
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=b.dataset.f;render();}));
document.getElementById('vFlat').addEventListener('click',()=>{view='flat';document.getElementById('vFlat').classList.add('active');document.getElementById('vGroup').classList.remove('active');render();});
document.getElementById('vGroup').addEventListener('click',()=>{view='group';document.getElementById('vGroup').classList.add('active');document.getElementById('vFlat').classList.remove('active');render();});
document.querySelectorAll('thead th').forEach(th=>th.addEventListener('click',()=>{if(view!=='flat')return;const k=th.dataset.s;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=k==='signal_date'?-1:1;}render();}));
renderSummary();render();
</script>
